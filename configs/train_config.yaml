model:
  name: "unsloth/DeepSeek-R1-Distill-Qwen-7B-unsloth-bnb-4bit"
  max_seq_length: 192
  load_in_4bit: true

lora:
  r: 16
  alpha: 16
  dropout: 0
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_gradient_checkpointing: "unsloth"

data:
  dataset_dir: "data/dataset"
  text_column: "text"
  max_samples: 500_000  

training:
  output_dir: "data/checkpoints"
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-4
  num_train_epochs: 1
  warmup_steps: 5
  max_steps: -1  # -1 means use num_train_epochs
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  seed: 42
  optim: "adamw_8bit"
  lr_scheduler_type: "linear"
  fp16: false
  bf16: true
  weight_decay: 0.01

hub:
  push_to_hub: true
  repo_id: "lschmidttraub/chess-llm-deepseek-7b"  # your HF username/repo
  merge_16bit: false  # true to merge LoRA into full model, false to push adapter only
  private: true

wandb:
  enabled: True
  project: "chess-llm"
  run_name: null  # auto-generated if null
